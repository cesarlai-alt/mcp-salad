name: mysql
display_name: MySQL
description: Read and query MySQL databases — inspect schemas, run SQL queries, with optional write access via env flags
author: benborla
homepage: https://github.com/benborla/mcp-server-mysql
license: MIT
tags: [database, mysql, sql, data, backend]
install:
  type: stdio
  command: npx
  args: ["-y", "@benborla29/mcp-server-mysql"]
  env_required:
    - name: MYSQL_HOST
      description: "MySQL server hostname (e.g. localhost or 127.0.0.1)"
    - name: MYSQL_USER
      description: "MySQL username"
    - name: MYSQL_PASS
      description: "MySQL password"
    - name: MYSQL_DB
      description: "Default database name to connect to"
claude_config: |
  {
    "command": "npx",
    "args": ["-y", "@benborla29/mcp-server-mysql"],
    "env": {
      "MYSQL_HOST": "127.0.0.1",
      "MYSQL_USER": "root",
      "MYSQL_PASS": "YOUR_PASSWORD",
      "MYSQL_DB": "your_database"
    }
  }
